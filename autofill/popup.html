<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 200px; padding: 10px; font-family: sans-serif; }
    input { width: 100%; margin-bottom: 10px; padding: 5px; box-sizing: border-box; }
    button { width: 100%; margin-top: 5px; cursor: pointer; padding: 8px; }
    .btn-max { background-color: #1890ff; color: white; border: none; border-radius: 4px; }
    .btn-custom { background-color: #52c41a; color: white; border: none; border-radius: 4px; }
  </style>
</head>
<body>
  <h4 style="margin-top: 0;">Auto Fill Point</h4>
  <button id="fillMax" class="btn-max">Điền điểm tối đa</button>
  <hr>
  <input type="number" id="customValue" placeholder="Nhập số điểm cụ thể...">
  <button id="fillCustom" class="btn-custom">Điền số đã nhập</button>

  <script src="popup.js"></script>
</body>
</html>
